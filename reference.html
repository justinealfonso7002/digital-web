<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reference Assistance</title>
    <style>
        * {
            margin:0;
             padding:0; 
             box-sizing:border-box;
              font-family:Arial, 
              sans-serif;
            }

        body {
            background:white;
        }

        header {
            background:#22c55e;
             color:white; 
             padding:15px;
              display:flex; 
              justify-content:space-between;
               align-items:center;
            }

        .back-btn {
            background:#facc15;
             color:black;
             padding:8px 15px; 
             border-radius:8px; 
             text-decoration:none;
              font-weight:bold;
            }

        .container {
            max-width:900px;
             margin:30px auto;
              padding:0 20px;
            }

        h1 {text-align:center; 
            margin-bottom:20px;

        }

        .content-box {
            border:3px solid #22c55e; 
            padding:30px; 
            border-radius:15px;
        }

        .service-item {
            display:flex; 
            align-items:center; 
            gap:15px; padding:15px; 
            background:#fef3c7;
             margin:10px 0;
              border-radius:10px; 
              font-size:30px;
            }

        footer {
            background:#22c55e; 
            color:white; 
            text-align:center; 
            padding:20px;
             margin-top:50px;
            }

    </style>

</head>
<body>
<header>
    <h3>🎧 Reference Assistance</h3>
    <a href="index.html" class="back-btn">⬅️ Back</a>
</header>
<div class="container">
    <div class="content-box">
        <h1>How Can We Help?</h1>
        <p style="margin-bottom:20px; text-align:justify;"></p>
        
        <div class="service-item"><span>🔍</span><div><h4>Information Search</h4><p>Help in finding specific materials.</p></div></div>
        <div class="service-item"><span>📑</span><div><h4>Research Guidance</h4><p>Assistance on how to start your research.</p></div></div>
        <div class="service-item"><span>💻</span><div><h4>Online Access Help</h4><p>Guide on using the digital library.</p></div></div>
    </div>
</div>
<footer>2026,PSAU DIGITAL LIBRARY</footer>
</body>
</html>
