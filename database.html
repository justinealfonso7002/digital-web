<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Databases</title>
    <style>
        * {
            margin:0;
             padding:0;
              box-sizing:border-box;
               font-family:Arial, 
               sans-serif;
            }

        body {
            background:white;
        }

        header {
            background:#22c55e; 
            color:white;
             padding:15px;
              display:flex; 
              justify-content:space-between;
               align-items:center;
            }

        .back-btn 
        {background:#facc15;
             color:black; 
             padding:8px 15px; 
             border-radius:8px;
              text-decoration:none;
               font-weight:bold
            }

        .container {
            max-width:900px;
            margin:30px auto;
             padding:0 20px;
            }

        h1 {
            text-align:center; 
            margin-bottom:20px;
        }

        .content-box {
            border:3px solid #22c55e; 
            padding:30px;
            border-radius:15px;
            }

        .db-item {
            display:flex; 
            align-items:center; 
            gap:15px; padding:15px; 
            background:#fef3c7;
            margin:10px 0; 
            border-radius:10px; 
            font-size:30px;
        }

        .db-text {
            flex:1;
        }

        .access-btn {
            background:#22c55e; 
            color:white;
             padding:8px 15px; 
             text-decoration:none; 
             border-radius:8px; 
             font-weight:bold;
            }

        footer {
            background:#22c55e; 
            color:white; 
            text-align:center;
             padding:20px;
              margin-top:50px;
            }

    </style>
</head>
<body>
<header>
    <h3>🗄️ Databases</h3>
    <a href="index.html" class="back-btn">⬅️ Back</a>
</header>
<div class="container">
    <div class="content-box">
        <h1>Online Resources</h1>
        
        <div class="db-item">
            <span>📁</span>
            <div class="db-text">
                <h4>Student Research Repository</h4>
                <p style="font-size:14px; color:#666;">Collection of Theses and Capstone Projects.</p>
            </div>
            <a href="#" class="access-btn">Access</a>
        </div>

        <div class="db-item">
            <span>🌐</span>
            <div class="db-text">
                <h4>E-Library Links</h4>
                <p style="font-size:14px; color:#666;">Trusted websites and online references.</p>
            </div>
            <a href="#" class="access-btn">Access</a>
        </div>

        <div class="db-item">
            <span>📊</span>
            <div class="db-text">
                <h4>Statistical Data Center</h4>
                <p style="font-size:14px; color:#666;">Reports and historical data.</p>
            </div>
            <a href="#" class="access-btn">Access</a>
        </div>

    </div>
</div>
<footer>2026,PSAU DIGITAL LIBRARY</footer>
</body>
</html>
