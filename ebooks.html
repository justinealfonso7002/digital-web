<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Books - PSAU Digital Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        header {
            background: #22c55e;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: #facc15;
            color: black;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #000;
        }

        /* GRID LAYOUT — 2 COLUMNS */
        .books-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .book-card {
            border: 2px solid #22c55e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: #f8fafc;
        }

        .book-card h3 {
            font-size: 20px;
            margin-bottom: 12px;
            color: #222;
        }

        /* ✅ BOOK IMAGE STYLING */
        .book-img {
            width: 100%;
            height: 200px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
            background: #e5e5e5;
        }

        .book-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* make image fit nicely */
        }

        .book-card p {
            font-size: 15px;
            color: #555;
            margin-bottom: 15px;
        }

        .read-btn {
            background: #22c55e;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }

        .read-btn:hover {
            background: #16a34a;
        }

        footer {
            background: #22c55e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

    
        @media (max-width: 700px) {
            .books-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h3>📚 E-Books</h3>
    <a href="index.html" class="back-btn">⬅️ Back</a>
</header>

<div class="container">
    <h1>Book Collection</h1>

    <div class="books-grid">

        <div class="book-card">
            <h3>Agriculture</h3>
            <div class="book-img">
                
                <img src="agri.png" alt="Agriculture Book">
            </div>
            <p>by Author Name</p>
            <a href="agriculture.html" class="read-btn">Read Now</a>
        </div>

       
        <div class="book-card">
            <h3>Medical</h3>
            <div class="book-img">
                <img src="med.png" alt="Medical Book">
            </div>
            <p>by Author Name</p>
            <a href="#" class="read-btn">Read Now</a>
        </div>

       
        <div class="book-card">
            <h3>Information Technology</h3>
            <div class="book-img">
                <img src="it.png" alt="IT Book">
            </div>
            <p>by Author Name</p>
            <a href="#" class="read-btn">Read Now</a>
        </div>

        
        <div class="book-card">
            <h3>Entrepreneurship</h3>
            <div class="book-img">
                <img src="ent.png" alt="Entrepreneurship Book">
            </div>
            <p>by Author Name</p>
            <a href="#" class="read-btn">Read Now</a>
        </div>

    </div>
</div>

<footer>
    © 2026 PSAU DIGITAL LIBRARY
</footer>

</body>
</html>
