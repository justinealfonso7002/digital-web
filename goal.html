<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Goal</title>
    <style>

            margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif;

        }

        header {
            background:#22c55e;

        }

            max-width:900px;

        }
